server {
    listen 80;
    root /usr/share/nginx/html;

    # Forward Flask API paths to the backend container.
    # In Docker, "backend" resolves to the backend service defined in docker-compose.yml.
    # Add any new Flask routes you create to this pattern.
    location ~ ^/(books|members|borrow|return|ping) {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # All other paths are handled by React.
    # try_files serves a real file if it exists (CSS, JS, images),
    # otherwise falls back to index.html so React Router can handle the path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
